name: MLflow CI Workflow

on:
  push:
    branches:
      - main

jobs:
  train_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . --env-manager=local
          
      - name: Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          cd MLProject
          # Creating a simple Dockerfile for the serving image
          echo "FROM python:3.12" > Dockerfile
          echo "RUN pip install mlflow==2.19.0 pandas scikit-learn" >> Dockerfile
          echo "COPY . /app" >> Dockerfile
          echo "WORKDIR /app" >> Dockerfile
          echo "CMD [\"python\", \"modelling.py\"]" >> Dockerfile
          
          docker build -t ${{ secrets.DOCKER_USERNAME }}/churn-model:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-model:latest
